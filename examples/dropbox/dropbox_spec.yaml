
# Example dropbox specification — single-file and wildcard patterns.
# Uses OmegaConf interpolation for paths.

dropbox_home: //cnrastore-bdo/Modeling_Data/repo_staging_auto/dropbox

data:

  - name: USGS Aquarius flows
    skip: false
    collect:
      file_pattern: "Discharge.ft^3_s.velq@{agency_id}.EntireRecord.csv"
      location: "W:/projects/usgs/usgs_aquarius_request_2020"
      recursive_search: true
      reader: read_ts
      selector: Value
    metadata:
      station_id: infer_from_agency_id
      agency_id: infer_from_filename        # <-- add this; triggers inference mode
      source: aquarius
      agency: usgs
      freq: infer
      param: flow
      subloc: default
      unit: ft^3/s
      time_zone: Etc/GMT+8
    output:
      repo_name: formatted
      repo_data_dir: ./fake_repo/formatted
      staging:
        dir: ./drop_staging
        write_args:
          float_format: "%.1f"
          chunk_years: true
      reconcile:
        prefer: staged
        allow_new_series: true
        inspection:                               # update parameters. These should be included but seldom change
          recent_years: 3                         # Up to 3 year old data will be checked whenever update is performed
          p3: 0.15                                # probability of a spot check for 3-10 ago, differences will trigger full replacment of all years
          p10: 0.05                               # probability of a spot check for data 10+ years old, differences will trigger full replacment of all years


