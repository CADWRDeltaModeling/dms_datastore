
# Example dropbox specification — single-file and wildcard patterns.
# Uses OmegaConf interpolation for paths.

dropbox_home: //cnrastore-bdo/Modeling_Data/repo_staging/dropbox

data:
  - name: Mokelumne
    collect:
      file_pattern: "ebmud_wbr_flow*.csv"
      location: "${dropbox_home}/ebmud"
      recursive_search: false
      reader: read_ts
      wildcard: time_shard
      selector: null
    metadata:
      station_id: wbr
      source: ebmud
      agency: usgs
      freq: infer
      param: flow
      unit: ft^3/s
      subloc: default
      time_zone: Etc/GMT+8
      # Coordinates are auto-populated from the station registry.
    output:
      repo_name: formatted
      staging:
        dir: ./drop_staging
        write_args:
          float_format: "%.4f"
      reconcile:
        prefer: staged
        allow_new_series: true
        inspection:
          recent_years: 3
          p3: 0.15
          p10: 0.05

  - name: USGS Aquarius flows
    skip: true
    collect:
      file_pattern: "Discharge.ft^3_s.velq@*.EntireRecord.csv"
      location: "${dropbox_home}/usgs_aquarius_request_2020"
      recursive_search: true
      reader: read_ts
      selector: Value
    metadata:
      station_id: infer_from_agency_id
      source: aquarius
      agency: usgs
      freq: infer
      param: flow
      subloc: default
      unit: ft^3/s
      time_zone: Etc/GMT+8
    metadata_infer:
      regex: .*@(.*)\.EntireRecord.csv
      groups:
        1: agency_id
    output:
      repo_name: formatted
      staging:
        dir: ./drop_staging
        write_args:
          float_format: "%.4f"
      reconcile:
        prefer: staged
        allow_new_series: true
        inspection:
          recent_years: 3
          p3: 0.15
          p10: 0.05


