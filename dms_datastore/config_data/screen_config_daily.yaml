# This screening config as of 2026-05-03 mostly applies to operational flow (and CX2)series 
# Operational variables tend to vary erratically and so these are mostly just a bunch of independent
# bounds checks based on generously accommodating the capacities, imposing nonnegativity as appropriate.
# outflow can go negative but pumping does not.


defaults:
  global:
    steps:
      - method: bounds_test
        label: nonnegative_default
        apply_immediately: true
        args:
          bounds: [0, 2000000.]

  params:
    # Flow-like variables
    flow:
      inherits_global: true

    dto:
      inherits_global: false
      steps:
        - method: bounds_test
          label: dto_lower_bound
          apply_immediately: true
          args:
            bounds: [-5000., 2000000.]

    # X2 / intrusion distance
    cx2:
      inherits_global: false
      steps:
        - method: bounds_test
          label: cx2_bounds
          apply_immediately: true
          args:
            bounds: [20., 95.]

regions:
  region_file: none

  default:
    params: {}

stations:
  bks:
    params:
      flow:
        inherits_global: false
        steps:
          - method: bounds_test
            label: bks_upper
            apply_immediately: true
            args:
              bounds: [0., 200.]

  trp:
    params:
      flow:
        inherits_global: false
        steps:
          - method: bounds_test
            label: trp_upper
            apply_immediately: true
            args:
              bounds: [0., 5500.]

  hro:
    params:
      flow:
        inherits_global: false
        steps:
          - method: bounds_test
            label: hro_upper
            apply_immediately: true
            args:
              bounds: [0., 15000.]

  bbi:
    params:
      flow:
        inherits_global: false
        steps:
          - method: bounds_test
            label: bbi_upper
            apply_immediately: true
            args:
              bounds: [0., 500.]

  wbr:
    params:
      flow:
        inherits_global: false
        steps:
          - method: bounds_test
            label: wbr_upper
            apply_immediately: true
            args:
              bounds: [0., 10000.]